<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>出汁図鑑</title>

<style>

body{
    font-family:sans-serif;
    background:#f4f1ea;
    text-align:center;
    padding:20px;
    margin:0;
}

h1{
    margin-bottom:20px;
    color:#333;
}

h2{
    margin-top:40px;
    margin-bottom:16px;
    color:#444;
}

.button{
    margin:10px;
    padding:14px 24px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#d8a31a;
    color:#24324a;
    cursor:pointer;
}

#zukan{
    display:flex;
    flex-direction:column;
    gap:16px;
    margin-top:30px;
}

.card{
    background:white;
    border-radius:16px;
    padding:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);

    display:flex;
    align-items:center;
    gap:16px;

    text-align:left;

    width:100%;
    max-width:500px;

    margin:0 auto;

    box-sizing:border-box;
}

.card img{
    width:80px;
    height:80px;
    object-fit:cover;
    border-radius:12px;
    flex-shrink:0;
}

.name{
    font-weight:bold;
    font-size:18px;
    color:#333;
}

.text{
    margin-top:6px;
    font-size:14px;
    line-height:1.6;
    color:#555;
    word-break:break-word;
}

@media screen and (max-width:600px){

    .card{
        gap:12px;
        padding:10px;
    }

    .card img{
        width:70px;
        height:70px;
    }

    .name{
        font-size:16px;
    }

    .text{
        font-size:13px;
    }

}

</style>

</head>

const discovered =
JSON.parse(
localStorage.getItem("discovered")
) || [];

const categories = {

    "fushi":"節",
    "niboshi":"煮干し",
    "other":"その他",
    "item":"レアアイテム"

};

const zukan =
document.getElementById("zukan");

Object.keys(categories).forEach(category => {

    const filtered =
    items.filter(item =>
        item.category === category
    );

    const foundCount =
    filtered.filter(item =>
        discovered.includes(item.name)
    ).length;

    zukan.innerHTML += `

    <h2>
    ${categories[category]}
    ${foundCount} / ${filtered.length}
    </h2>

    `;

    filtered.forEach(item => {

        const found =
        discovered.includes(item.name);

        zukan.innerHTML += `

        <div class="card">

            <img src="${
                found
                ? item.image
                : 'images/question.jpg'
            }">

            <div>

                <div class="name">
                ${
                    found
                    ? item.name
                    : '？？？'
                }
                </div>

                <div class="text">
                ${
                    found
                    ? item.text
                    : 'まだ発見していません'
                }
                </div>

});
