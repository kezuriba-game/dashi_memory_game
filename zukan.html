.count{

.unknown{

@media screen and (max-width:600px){

    .card{

        padding:10px;

const discovered =

localStorage.getItem("discovered")
) || [];

const categories = {

    "fushi":"節",
    "niboshi":"煮干し",
    "other":"その他",
    "item":"レアアイテム"

};

const zukan =
document.getElementById("zukan");

Object.keys(categories).forEach(category => {

    const filtered =
    items.filter(item =>
        item.category === category
    );

    const foundCount =
    filtered.filter(item =>
        discovered.includes(item.name)
    ).length;

    zukan.innerHTML += `

    <h2>
    ${categories[category]}
    <span class="count">
    ${foundCount} / ${filtered.length}
    </span>
    </h2>

    `;

    filtered.forEach(item => {

        const found =
        discovered.includes(item.name);

        zukan.innerHTML += `

        <div class="card">

            <img
            class="${found ? '' : 'unknown'}"
            src="${
                found
                ? item.image
                : 'images/question.jpg'
            }">

                    ? item.name
