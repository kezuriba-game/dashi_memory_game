<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>出汁図鑑</title>

<style>

body{
    font-family:sans-serif;
    background:#f4f1ea;
    text-align:center;
    padding:20px;
    margin:0;
}

h1{
    margin-bottom:20px;
    color:#333;
}

h2{
    margin-top:40px;
    margin-bottom:16px;
    color:#444;
}

.button{
    margin:10px;
    padding:14px 24px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#f7e045;
    color:#091a70;
    cursor:pointer;
}

#zukan{
    display:flex;
    flex-direction:column;
    gap:16px;
    margin-top:30px;
}

.card{
    background:white;
    border-radius:16px;
    padding:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);

    display:flex;
    align-items:center;
    gap:16px;

    text-align:left;

    width:100%;
    max-width:500px;

    margin:0 auto;

    box-sizing:border-box;
}

.card img{
    width:80px;
    height:80px;
    object-fit:cover;
    border-radius:12px;
    flex-shrink:0;
}

.name{
    font-weight:bold;
    font-size:18px;
    color:#333;
}

.text{
    margin-top:6px;
    font-size:14px;
    line-height:1.6;
    color:#555;
    word-break:break-word;
}

@media screen and (max-width:600px){

    .card{
        gap:12px;
        padding:10px;
    }

    .card img{
        width:70px;
        height:70px;
    }

    .name{
        font-size:16px;
    }

    .text{
        font-size:13px;
    }

}

</style>

</head>

<body>

<h1>📖 出汁図鑑</h1>

<button class="button"
onclick="location.href='index.html'">
🎮 ゲームへ戻る
</button>

<div id="zukan"></div>

<script>

const items = [

{
category:"初級",
name:"中国昆布",
image:"images/chugokukonbu.jpg",
text:"中国産の昆布。比較的やさしい旨味。"
},

{
category:"初級",
name:"羅臼昆布",
image:"images/rausukonbu.jpg",
text:"香りが強く濃厚なだし。"
},

{
category:"初級",
name:"真昆布",
image:"images/makonbu.jpg",
text:"上品で澄んだだしが取れる。"
},

{
category:"中級",
name:"あご煮干",
image:"images/ago.jpg",
text:"上品な甘みのある煮干。"
},

{
category:"中級",
name:"片口煮干",
image:"images/katakuchi.jpg",
text:"定番の煮干し。力強い旨味。"
},

{
category:"上級",
name:"かつお枯節",
image:"images/katsuo-karebushi.jpg",
text:"熟成された深い香りと旨味。"
}

];

const categories = {

    "初級":10,
    "中級":12,
    "上級":10

};

const zukan =
document.getElementById("zukan");

Object.keys(categories).forEach(category => {

    const filtered =
    items.filter(item =>
    item.category === category);

    zukan.innerHTML += `

    <h2>
    ${category}
    （${filtered.length} / ${categories[category]}）
    </h2>

    `;

    filtered.forEach(item => {

        zukan.innerHTML += `

        <div class="card">

            <img src="${item.image}">

            <div>

                <div class="name">
                ${item.name}
                </div>

                <div class="text">
                ${item.text}
                </div>

            </div>

        </div>

        `;

    });

});

</script>

</body>
</html>
