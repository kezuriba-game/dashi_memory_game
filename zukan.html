const discovered =
JSON.parse(
localStorage.getItem("discovered")
) || [];

const categories = {

    "other":"昆布・乾物",
    "niboshi":"煮干し",
    "fushi":"節",
    "usukezuri":"薄削り",
    "atsukezuri":"厚削り",
    "kona":"粉末",
    "item":"レアアイテム"

};

const zukan =
document.getElementById("zukan");

Object.keys(categories).forEach(category => {

    const filtered =
    items.filter(item =>
        item.category === category
    );

    const foundCount =
    filtered.filter(item =>
        discovered.includes(item.name)
    ).length;

    zukan.innerHTML += `

    <h2>
    ${categories[category]}
    <span class="count">
    ${foundCount} / ${filtered.length}
    </span>
    </h2>

    `;

    filtered.forEach(item => {

        const found =
        discovered.includes(item.name);

        zukan.innerHTML += `

        <div class="card">

            <img
            class="${found ? '' : 'unknown'}"
            src="${
                found
                ? item.image
                : 'images/question.jpg'
            }">

            <div>

                <div class="name">
                ${
                    found
                    ? item.name
                    : '？？？'
                }
                </div>

                <div class="text">
                ${
                    found
                    ? item.text
                    : 'まだ発見していません'
                }
                </div>

            </div>

        </div>

        `;

    });

});
