<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>だし神経衰弱</title>

<style>

body{
    font-family:sans-serif;
    background:#f6f1e8;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    color:#3b2a22;
}

#status{
    margin:15px;
    font-size:18px;
    line-height:1.8;
}

#game{
    display:grid;
    gap:10px;
    justify-content:center;
    margin-top:20px;
    align-items: center;
}

.card{
    width:110px;
    height:110px;
    background:#b85c38;
    border-radius:10px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    transition:0.2s;
    aspect-ratio: 1 / 1;
    box-sizing: border-box;
    flex-shrink: 0;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

#message{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    min-height:40px;
}

.button{
    margin:10px auto;
    padding:14px 24px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#d8a31a;
    color:#24324a;
    cursor:pointer;
    display:block;
}

#startButton{
    background:#6e8b5b !important;
    color:white !important;
    font-weight:bold; 
}

#difficultyButtons{ 
    margin-top:20px; 
    display:flex; 
    justify-content:center; 
    gap:10px; 
}

@media screen and (max-width:700px){

    .card{
        width:72px;
        height:72px;
    }

    #status{
        font-size:15px;
    }

}

@keyframes glow {
    0% {
        box-shadow: 0 0 0px rgba(255, 215, 0, 0);
        transform: scale(1);
    }
    50% {
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.9);
        transform: scale(1.05);
    }
    100% {
        box-shadow: 0 0 0px rgba(255, 215, 0, 0);
        transform: scale(1);
    }
}

.card.glow {
    animation: glow 0.5s ease;
}
    
</style>
</head>

<body>

<h1>だし神経衰弱</h1>

<div id="status">
🎮 難易度: <span id="difficulty">-</span><br>
📚 ステージ: <span id="stage">1</span> / 6<br>
⏱ 残り時間: <span id="time">60</span>秒<br>
🏆 スコア: <span id="score">0</span>
</div>

<div id="message">
難易度を選んでね！
</div>

<div id="difficultyButtons">
    <button class="button" onclick="selectDifficulty('beginner')">
    初級
    </button>

    <button class="button" onclick="selectDifficulty('middle')">
    中級
    </button>

    <button class="button" onclick="selectDifficulty('hard')">
    上級
    </button>
</div>

<button id="startButton" class="button" style="display:none;">
ゲームスタート
</button>

<button class="button" onclick="goToZukan()"> 
📖 出汁図鑑 
</button>


<div id="game"></div>

<script>

const difficulties = {

  const items = [

{name:"真昆布", image:"makonbu", category:"other"},
{name:"羅臼昆布", image:"rausukonbu", category:"other"},
{name:"椎茸", image:"shitake", category:"other"},
{name:"イタヤ貝", image:"itayagai", category:"other"},

{name:"片口煮干", image:"katakuchi", category:"niboshi"},
{name:"白口煮干", image:"shirokuchi", category:"niboshi"},
{name:"平子煮干", image:"hirako", category:"niboshi"},

{name:"かつお枯節", image:"katsuo-karebushi", category:"fushi"},
{name:"宗田荒節", image:"souda-arabushi", category:"fushi"},

{name:"金のだし鍋", image:"goldpot", category:"item"}

];

};

const settings = {

    beginner:{
        pairs:6,
        columns:4,
        text:true
    },

    middle:{
        pairs:8,
        columns:4,
        text:true
    },

    hard:{
        pairs:10,
        columns:4,
        text:false
    }

};

const game = document.getElementById("game");
const startButton = document.getElementById("startButton");

let selectedDifficulty = "";
let currentStage = 0;

let score = 0;
let time = 60;

let timer;

let firstCard = null;
let secondCard = null;

let lock = true;
    
let matched = 0;
let discovered = JSON.parse(localStorage.getItem("discovered")) || [];

function updateUI(){

    document.getElementById("score").textContent = score;
    document.getElementById("time").textContent = time;
    document.getElementById("stage").textContent = currentStage + 1;

}

function selectDifficulty(level){

    clearInterval(timer);

    time = 60; 
    
    updateUI();
    
    selectedDifficulty = level;

    const names = {
        beginner:"初級",
        middle:"中級",
        hard:"上級"
    };

    document.getElementById("difficulty").textContent =
    names[level];

    document.getElementById("message").textContent =
    "スタートボタンを押してね！";

    startButton.textContent = "ゲームスタート";

    startButton.style.display = "block";

    currentStage = 0;
    score = 0;

    lock = true;

    firstCard = null;
    secondCard = null;

    game.innerHTML = "";

    updateUI();

document.getElementById("stageButtons")
.style.display = "flex";

}


function startTimer(){

    clearInterval(timer);

    timer = setInterval(() => {

        time--;

        updateUI();

        if(time <= 0){

            clearInterval(timer);

            lock = true;

            document.getElementById("message").textContent =
            "⏰ ゲームオーバー！";

            startButton.textContent = "もう一回！";

            startButton.style.display = "block";

        }

    },1000);

}

function createStage(){

    const stage = settings[selectedDifficulty];

    game.style.gridTemplateColumns =
    `repeat(${stage.columns}, auto)`;

    matched = 0;

    firstCard = null;
    secondCard = null;

    game.innerHTML = "";

    let pool = [];

if(selectedDifficulty === "beginner"){

    pool = items.filter(item =>
    item.category === "other"
    );

}

else if(selectedDifficulty === "middle"){

    pool = items.filter(item =>
    item.category === "other"
    || item.category === "niboshi"
    );

}

else if(selectedDifficulty === "hard"){

    pool = items.filter(item =>
    item.category !== "item"
    );

    if(Math.random() < 0.2){

        const rareItems =
        items.filter(item =>
        item.category === "item"
        );

        pool.push(...rareItems);

    }

}

const selectedItems =
[...pool]
.sort(() => Math.random() - 0.5)
.slice(0, stage.pairs);

    const cards =
[...selectedItems, ...selectedItems]
.sort(() => Math.random() - 0.5);

    cards.forEach(item => {

        const card = document.createElement("div");

        card.classList.add("card");

        card.dataset.name = item.name;

        card.onclick = () => {

            if(lock) return;

            if(card === firstCard) return;

            if(card.classList.contains("matched")) return;

            let imagePath = "";

            if(stage.text){

                imagePath =
                `images/${item.image}-text.jpg`;

            }else{

                imagePath =
                `images/${item.image}.jpg`;

            }

            card.innerHTML =
            `<img src="${imagePath}">`;

            if(!firstCard){

                firstCard = card;

            }else{

                secondCard = card;

                lock = true;

if(firstCard.dataset.name === secondCard.dataset.name){

    firstCard.classList.add("glow");
    secondCard.classList.add("glow");

    score += 100;
    matched++;

    updateUI();

    document.getElementById("message").textContent =
    "⭕ 正解！";

    if(!discovered.includes(item.name)){

        discovered.push(item.name);

        localStorage.setItem(
            "discovered",
            JSON.stringify(discovered)
        );

    }

    const card1 = firstCard;
    const card2 = secondCard;

    firstCard = null;
    secondCard = null;

    setTimeout(() => {

        card1.classList.remove("glow");
        card2.classList.remove("glow");

        card1.classList.add("matched");
        card2.classList.add("matched");

        lock = false;

        if(matched >= stage.pairs){

            clearInterval(timer);

            lock = true;

            if(currentStage >= stages.length - 1){

                document.getElementById("message").textContent =
                "🏆 全ステージクリア！";

                startButton.textContent =
                "最初から遊ぶ";

                currentStage = 0;
                
}else{

    document.getElementById("message").textContent =
    "🎉 ステージクリア！";

    startButton.textContent =
    "もう一回遊ぶ";

}

            startButton.style.display = "block";

        }

    },500);


}else{

    document.getElementById("message").textContent =
    "❌ ミス！";

    setTimeout(() => {

        firstCard.innerHTML = "";
        secondCard.innerHTML = "";

        firstCard = null;
        secondCard = null;

        lock = false;

    },1000);

}

            }

        };


        game.appendChild(card);

    });

}

function selectStage(stageIndex){

    currentStage = stageIndex;

    time = 60;

    updateUI();

    startButton.textContent =
    "ゲームスタート";

    startButton.style.display =
    "block";

    document.getElementById("message")
    .textContent =
    `Stage${stageIndex + 1}を開始！`;

}
    
startButton.onclick = () => {

    if(!selectedDifficulty) return;

    time = 60;

    updateUI();

    lock = false;

    startButton.style.display = "none";

    document.getElementById("message").textContent = "";

    createStage();

    startTimer();

};

updateUI();

function goToZukan(){

    clearInterval(timer);

    location.href = "zukan.html";

}


</script>

</body>
</html>
