<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>だし神経衰弱</title>

<style>

body{

    font-family:sans-serif;

    background-color:#efe2cc;

background-image:

linear-gradient(
    30deg,
    rgba(255,255,255,0.18) 12%,
    transparent 12.5%,
    transparent 87%,
    rgba(255,255,255,0.18) 87.5%,
    rgba(255,255,255,0.18)
),

linear-gradient(
    150deg,
    rgba(255,255,255,0.18) 12%,
    transparent 12.5%,
    transparent 87%,
    rgba(255,255,255,0.18) 87.5%,
    rgba(255,255,255,0.18)
),

linear-gradient(
    90deg,
    rgba(216,193,160,0.22) 2%,
    transparent 2.5%,
    transparent 97%,
    rgba(216,193,160,0.22) 97.5%,
    rgba(216,193,160,0.22)
);

background-size:80px 140px;

background-position:
0 0,
0 0,
40px 70px;

    min-height:100vh;

    text-align:center;
    margin:0;
    padding:20px;
}
    
h1{
    color:#3a2b24;
}

#status{
    display:flex;
    justify-content:center;
    gap:10px;

    flex-wrap:nowrap;

    margin:30px auto;

    width:100%;
    max-width:420px;
}
    
#game{
    display:grid;
    gap:10px;
    justify-content:center;
    margin-top:20px;
    align-items: center;
}

.card{
    width:110px;
    height:110px;
    background:#b9603a;
    border-radius:10px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    transition:0.2s;
    aspect-ratio: 1 / 1;
    box-sizing: border-box;
    flex-shrink: 0;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

#message{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    min-height:40px;
}

.button{

    margin:4px;

    padding:12px 14px;

    min-width:72px;

    font-size:16px;
    font-weight:bold;

    border:none;
    border-radius:16px;

    background:#c89b2d;
    color:#24324a;

    cursor:pointer;

    box-shadow:
    0 4px 8px rgba(0,0,0,0.12);

    transition:0.2s;

    display:block;
    margin-left:auto;
    margin-right:auto;
}

.button:hover{
    transform:translateY(-2px);
}

.status-box{

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.75) 0%,
        rgba(255,248,240,0.92) 100%
    );

    border:1px solid #d7c3a7;

    border-radius:18px;

    padding:12px 8px;

    flex:1;

    min-width:0;

    max-width:120px;

    backdrop-filter: blur(3px);

    box-shadow:
    0 4px 10px rgba(80,60,40,0.08);
}

.status-title{
    font-size:13px;
    color:#7f6446;
    margin-bottom:8px;
}

.status-value{
    font-size:28px;
    font-weight:bold;
    color:#3e2d22;
}
    
#startButton{
    background:#7a8e63 !important;
    color:#ffffff !important;
    font-weight:bold; 
}

#difficultyButtons{

    display:flex;
    justify-content:center;
    gap:8px;

    flex-wrap:nowrap;

    margin-top:30px;
    margin-bottom:20px;

    width:100%;
    max-width:420px;

    margin-left:auto;
    margin-right:auto;
}

#difficultyButtons .button{
    margin:0;
}
    
@media screen and (max-width:700px){

    .card{
        width:72px;
        height:72px;
    }

    #status{
        font-size:15px;
    }

    #status{
    gap:8px;
    }

    .status-box{
    border-radius:14px;
    }
    
    .status-title{
    font-size:11px;
    }
    
    .status-value{
    font-size:20px;
    }

}

@keyframes glow {
    0% {
        box-shadow: 0 0 0px rgba(255, 215, 0, 0);
        transform: scale(1);
    }
    50% {
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.9);
        transform: scale(1.05);
    }
    100% {
        box-shadow: 0 0 0px rgba(255, 215, 0, 0);
        transform: scale(1);
    }
}

.card.glow {
    animation: glow 0.5s ease;
}
    
</style>
</head>

<body>

<h1>だし神経衰弱</h1>

<div id="status">

    <div class="status-box">
        <div class="status-title">難易度</div>
        <div class="status-value" id="difficulty">-</div>
    </div>

    <div class="status-box">
        <div class="status-title">残り時間</div>
        <div class="status-value">
            <span id="time">60</span>秒
        </div>
    </div>

    <div class="status-box">
        <div class="status-title">スコア</div>
        <div class="status-value" id="score">0</div>
    </div>

</div>

<div id="message">
難易度を選んでね！
</div>

<div id="difficultyButtons">
    <button class="button" onclick="selectDifficulty('beginner')">
    初級
    </button>

    <button class="button" onclick="selectDifficulty('middle')">
    中級
    </button>

    <button class="button" onclick="selectDifficulty('hard')">
    上級
    </button>

    <button class="button" onclick="selectDifficulty('pro')">
    達人
    </button>
</div>

<button id="startButton" class="button" style="display:none;">
ゲームスタート
</button>

<button class="button" onclick="goToZukan()"> 
📖 出汁図鑑 
</button>


<div id="game"></div>

<script>

const items = [

{name:"真昆布", image:"makonbu", category:"other"},
{name:"羅臼昆布", image:"rausukonbu", category:"other"},
{name:"椎茸", image:"shitake", category:"other"},
{name:"イタヤ貝", image:"itayagai", category:"other"},
{name:"むきえび", image:"mukiebi", category:"other"},
{name:"素干えび", image:"suboshiebi", category:"other"},
{name:"いか下足", image:"ikageso", category:"other"},
{name:"ばら海苔", image:"baranori", category:"other"},
{name:"焼き海苔", image:"yakinori", category:"other"},

{name:"あご煮干", image:"ago", category:"niboshi"},
{name:"あじ煮干", image:"aji", category:"niboshi"},
{name:"えそ煮干", image:"eso", category:"niboshi"},
{name:"平子煮干", image:"hirako", category:"niboshi"},
{name:"いか煮干", image:"ika", category:"niboshi"},
{name:"片口煮干", image:"katakuchi", category:"niboshi"},
{name:"さんま煮干", image:"sanma", category:"niboshi"},
{name:"白口煮干", image:"shirokuchi", category:"niboshi"},
{name:"たい煮干", image:"tai", category:"niboshi"},
{name:"かき煮干", image:"kaki", category:"niboshi"},
{name:"さば煮干", image:"saba", category:"niboshi"},
{name:"うるめ煮干", image:"urume", category:"niboshi"},

{name:"かつお枯節", image:"katsuo-karebushi", category:"fushi"},
{name:"かつお荒節", image:"katsuo-arabushi", category:"fushi"},
{name:"宗田枯節", image:"souda-karebushi", category:"fushi"},
{name:"宗田荒節", image:"souda-arabushi", category:"fushi"},
{name:"さば枯節", image:"saba-karebushi", category:"fushi"},
{name:"さば荒節", image:"saba-arabushi", category:"fushi"},
{name:"むろあじ節", image:"muroajibushi", category:"fushi"},
{name:"さんま節", image:"sanmabushi", category:"fushi"},
{name:"うるめ節", image:"urumebushi", category:"fushi"},
{name:"平子節", image:"hirakobushi", category:"fushi"},

{name:"だしパック「極丸」", image:"kiwamaru", category:"item"},
{name:"わんこ節", image:"wankobushi", category:"item"},
{name:"削り器", image:"kezuriki", category:"item"},
{name:"鰹出汁の冷やしラーメン", image:"ramen", category:"item"},
{name:"鰹出汁がしみたおでん", image:"oden", category:"item"},
{name:"鰹節ふりかけのTKG", image:"tkg", category:"item"}

];

const settings = {

    beginner:{
        pairs:6,
        columns:4,
        text:true
    },

    middle:{
        pairs:8,
        columns:4,
        text:true
    },

    hard:{
        pairs:10,
        columns:4,
        text:false
    },

    pro:{
        pairs:10,
        columns:4,
        text:false,
        mixed:true
    }

};

const game = document.getElementById("game");
const startButton = document.getElementById("startButton");

let selectedDifficulty = "";

let score = 0;
let time = 60;

let timer;

let firstCard = null;
let secondCard = null;

let lock = true;
    
let matched = 0;
let discovered = JSON.parse(localStorage.getItem("discovered")) || [];
let currentDiscovered = [];

function updateUI(){

    document.getElementById("score").textContent = score;
    document.getElementById("time").textContent = time;

}

function selectDifficulty(level){

    clearInterval(timer);

    time = 60; 
    
    updateUI();
    
    selectedDifficulty = level;

    const names = {
        beginner:"初級",
        middle:"中級",
        hard:"上級",
        pro:"達人"
    };

    document.getElementById("difficulty").textContent =
    names[level];

    document.getElementById("message").textContent =
    "スタートボタンを押してね！";

    startButton.textContent = "ゲームスタート";

    startButton.style.display = "block";

    score = 0;

    lock = false;

    firstCard = null;
    secondCard = null;

    game.innerHTML = "";

    updateUI();

}


function startTimer(){

    clearInterval(timer);

    timer = setInterval(() => {

        time--;

        updateUI();

        if(time <= 0){

            clearInterval(timer);

            lock = true;

            document.getElementById("message").textContent =
            "⏰ ゲームオーバー！";

            startButton.textContent = "もう一回！";

            startButton.style.display = "block";

        }

    },1000);

}

function createStage(){

    const stage = settings[selectedDifficulty];

    game.style.gridTemplateColumns =
    `repeat(${stage.columns}, auto)`;

    matched = 0;

    currentDiscovered = [];

    firstCard = null;
    secondCard = null;

    game.innerHTML = "";

    let pool = [];

if(selectedDifficulty === "beginner"){

    pool = items.filter(item =>
        item.category === "other"
        || item.category === "niboshi"
    );

    // 5%でアイテム追加
    if(Math.random() < 0.05){

        const rareItems =
        items.filter(item =>
        item.category === "item"
        );

        pool.push(...rareItems);

    }

}

else if(selectedDifficulty === "middle"){

    pool = items.filter(item =>
        item.category === "niboshi"
        || item.category === "fushi"
    );

    // 10%でアイテム追加
    if(Math.random() < 0.1){

        const rareItems =
        items.filter(item =>
        item.category === "item"
        );

        pool.push(...rareItems);

    }

}

else if(selectedDifficulty === "hard"){

    pool = items.filter(item =>
        item.category === "other"
        || item.category === "niboshi"
        || item.category === "fushi"
    );

    // 15%でアイテム追加
    if(Math.random() < 0.15){

        const rareItems =
        items.filter(item =>
        item.category === "item"
        );

        pool.push(...rareItems);

    }

}

else if(selectedDifficulty === "pro"){

    pool = items.filter(item =>
        item.category === "fushi"
    );

    // 30%でアイテム追加
    if(Math.random() < 0.3){

        const rareItems =
        items.filter(item =>
            item.category === "item"
        );

        pool.push(...rareItems);

    }

}

const selectedItems =
[...pool]
.sort(() => Math.random() - 0.5)
.slice(0, stage.pairs);

let cards = [];

if(stage.mixed){

    selectedItems.forEach(item => {

    // レアアイテムだけ特殊
    if(item.category === "item"){

        cards.push({
            ...item,
            cardType:"text"
        });

        cards.push({
            ...item,
            cardType:"text"
        });

    }else{

        cards.push({
            ...item,
            cardType:"image"
        });

        cards.push({
            ...item,
            cardType:"moji"
        });

    }

});

}else{

    cards =
    [...selectedItems, ...selectedItems];

}

cards.sort(() => Math.random() - 0.5);

    cards.forEach(item => {

        const card = document.createElement("div");

        card.classList.add("card");

        card.dataset.name = item.name;

        card.onclick = () => {

            if(lock) return;

            if(card === firstCard) return;

            if(card.classList.contains("matched")) return;

            let imagePath = "";

            if(stage.mixed){

    if(item.cardType === "moji"){

    imagePath =
    `images/${item.image}-moji.jpg`;

}else if(item.cardType === "text"){

    imagePath =
    `images/${item.image}-text.jpg`;

}else{

    imagePath =
    `images/${item.image}.jpg`;

}

}else if(stage.text){

    imagePath =
    `images/${item.image}-text.jpg`;

}else{

    imagePath =
    `images/${item.image}.jpg`;

}

            card.innerHTML =
            `<img src="${imagePath}">`;

            if(!firstCard){

                firstCard = card;

            }else{

                secondCard = card;

                lock = true;

if(firstCard.dataset.name === secondCard.dataset.name){

    firstCard.classList.add("glow");
    secondCard.classList.add("glow");

    score += 100;
    matched++;

    updateUI();

    document.getElementById("message").textContent =
    "⭕ 正解！";

    if(!currentDiscovered.includes(item.name)){

    currentDiscovered.push(item.name);

}

    const card1 = firstCard;
    const card2 = secondCard;

    firstCard = null;
    secondCard = null;

    setTimeout(() => {

    card1.classList.remove("glow");
    card2.classList.remove("glow");

    card1.classList.add("matched");
    card2.classList.add("matched");

    lock = false;

    if(matched >= stage.pairs){

        clearInterval(timer);

        lock = true;


currentDiscovered.forEach(name => {

    if(!discovered.includes(name)){

        discovered.push(name);

    }

});

localStorage.setItem(
    "discovered",
    JSON.stringify(discovered)
);
        
        document.getElementById("message").textContent =
        "🎉 クリア！";

        startButton.textContent =
        "もう一回遊ぶ";

        startButton.style.display = "block";

    }

},500);


}else{

    document.getElementById("message").textContent =
    "❌ ミス！";

    setTimeout(() => {

        firstCard.innerHTML = "";
        secondCard.innerHTML = "";

        firstCard = null;
        secondCard = null;

        lock = false;

    },1000);

}

            }

        };


        game.appendChild(card);

    });

}

    
startButton.onclick = () => {

    if(!selectedDifficulty) return;

    time = 60;

    updateUI();

    lock = false;

    startButton.style.display = "none";

    document.getElementById("message").textContent = "";

    createStage();

    startTimer();

};

updateUI();

function goToZukan(){

    clearInterval(timer);

    location.href = "zukan.html";

}


</script>

</body>
</html>
