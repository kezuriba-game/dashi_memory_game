<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>出汁メモリーゲーム</title>

<style>
body{
    font-family:sans-serif;
    background:#f4f1ea;
    text-align:center;
}

h1{
    margin-top:20px;
}

#status{
    margin:15px;
    font-size:20px;
}

#game{
    display:grid;
    grid-template-columns:repeat(4,140px);
    gap:12px;
    justify-content:center;
}

.card{
    width:140px;
    height:140px;
    background:#2c3e50;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

#message{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🐟 出汁メモリーゲーム</h1>

<div id="status">
⏱ 残り時間: <span id="time">60</span>秒　
🏆 スコア: <span id="score">0</span>
</div>

<div id="game"></div>

<div id="message"></div>

<script>

const allItems = [
  {name:"あご煮干", image:"images/ago.png"},
  {name:"あじ煮干", image:"images/aji.png"},
  {name:"エソ煮干", image:"images/eso.png"},
  {name:"平子煮干", image:"images/hirako.png"},
  {name:"イカ煮干", image:"images/ika.png"},
  {name:"片口煮干", image:"images/katakuchi.png"},
  {name:"さんま煮干", image:"images/sanma.png"},
  {name:"白口煮干", image:"images/shirokuchi.png"}
];

const game = document.getElementById("game");

let firstCard = null;
let lock = false;
let score = 0;
let matched = 0;
let time = 60;

function updateUI(){
    document.getElementById("score").textContent = score;
    document.getElementById("time").textContent = time;
}

const timer = setInterval(() => {

    time--;

    updateUI();

    if(time <= 0){

        clearInterval(timer);

        document.getElementById("message").textContent =
        "ゲームオーバー！";

        lock = true;
    }

},1000);

function startStage(){

    matched = 0;

    game.innerHTML = "";

    firstCard = null;

    lock = false;

    // ランダムで8種類選ぶ
    const shuffled = [...allItems].sort(() => Math.random() - 0.5);

    const selected = shuffled.slice(0,8);

    const cards = [...selected, ...selected]
    .sort(() => Math.random() - 0.5);

    cards.forEach(item => {

        const card = document.createElement("div");

        card.classList.add("card");

        card.dataset.name = item.name;

        card.onclick = () => {

            if(lock || card.classList.contains("open")) return;

            card.classList.add("open");

            card.innerHTML = `
            <img src="${item.image}">
            `;

            if(!firstCard){

                firstCard = card;

            }else{

                if(firstCard.dataset.name === card.dataset.name){

                    score += 100;

                    matched++;

                    document.getElementById("message").textContent =
                    "正解！";

                    firstCard = null;

                    if(matched === selected.length){

                        document.getElementById("message").textContent =
                        "🎉ステージクリア！🎉";

                        setTimeout(() => {

                            startStage();

                        },1500);
                    }

                }else{

                    lock = true;

                    document.getElementById("message").textContent =
                    "ミス！";

                    setTimeout(() => {

                        firstCard.innerHTML = "";

                        card.innerHTML = "";

                        firstCard.classList.remove("open");

                        card.classList.remove("open");

                        firstCard = null;

                        lock = false;

                    },800);
                }

                updateUI();
            }
        };

        game.appendChild(card);

    });

    updateUI();
}

startStage();

</script>

</body>
</html>
