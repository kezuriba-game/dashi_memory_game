<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>だし神経衰弱</title>

<style>

body{
    font-family:sans-serif;
    background:#f4f1ea;
    text-align:center;
}

h1{
    margin-top:20px;
    color:#333;
}

#status{
    margin:15px;
    font-size:20px;
}

#game{
    display:grid;
    grid-template-columns:repeat(4,150px);
    gap:12px;
    justify-content:center;
    margin-top:20px;
}

.card{
    width:150px;
    height:150px;
    background:#2c3e50;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

#message{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
    color:#444;
    min-height:40px;
}

#startButton{
    margin:20px auto;
    padding:14px 28px;
    font-size:20px;
    border:none;
    border-radius:12px;
    background:#ffb347;
    cursor:pointer;
    display:block;
}

</style>
</head>

<body>

<h1>だし神経衰弱</h1>

<div id="status">
🎮 ステージ: <span id="stage">1</span>　
⏱ 残り時間: <span id="time">60</span>秒　
🏆 スコア: <span id="score">0</span>
</div>

<div id="message">
「ゲームスタート」を押して開始！
</div>

<button id="startButton">
ゲームスタート
</button>

<div id="game"></div>

<script>

const allItems = [

  {name:"あご煮干", image:"images/ago.png"},
  {name:"あじ煮干", image:"images/aji.png"},
  {name:"えそ煮干", image:"images/eso.png"},
  {name:"平子煮干", image:"images/hirako.png"},
  {name:"いか煮干", image:"images/ika.png"},
  {name:"片口煮干", image:"images/katakuchi.png"},
  {name:"さんま煮干", image:"images/sanma.png"},
  {name:"白口煮干", image:"images/shirokuchi.png"},
  {name:"たい煮干", image:"images/tai.png"},
  {name:"かき煮干", image:"images/kaki.png"},
  {name:"さば煮干", image:"images/saba.png"}
];

const game = document.getElementById("game");
const startButton = document.getElementById("startButton");

let firstCard = null;
let secondCard = null;
let lock = true;

let score = 0;
let matched = 0;
let stage = 1;
let time = 60;

let timer;

function updateUI(){

    document.getElementById("score").textContent = score;
    document.getElementById("time").textContent = time;
    document.getElementById("stage").textContent = stage;

}

function startTimer(){

    clearInterval(timer);

    timer = setInterval(() => {

        time--;

        updateUI();

        if(time <= 0){

            clearInterval(timer);

            lock = true;

            document.getElementById("message").textContent =
            "⏰ ゲームオーバー！";

            startButton.textContent = "もう一回！";
            startButton.style.display = "block";
        }

    },1000);

}

function createStage(){

    matched = 0;

    firstCard = null;
    secondCard = null;

    game.innerHTML = "";

    const shuffled = [...allItems]
    .sort(() => Math.random() - 0.5);

    const selected = shuffled.slice(0, Math.min(8, allItems.length));

    const cards = [...selected, ...selected]
    .sort(() => Math.random() - 0.5);

    cards.forEach(item => {

        const card = document.createElement("div");

        card.classList.add("card");

        card.dataset.name = item.name;

        card.onclick = () => {

            if(lock) return;

            if(card === firstCard) return;

            if(card.classList.contains("matched")) return;

            card.innerHTML =
            `<img src="${item.image}">`;

            if(!firstCard){

                firstCard = card;

            }else{

                secondCard = card;

                lock = true;

                // 正解
                if(firstCard.dataset.name === secondCard.dataset.name){

                    firstCard.classList.add("matched");
                    secondCard.classList.add("matched");

                    score += 100;
                    matched++;

                    updateUI();

                    document.getElementById("message").textContent =
                    "⭕ 正解！";

                    firstCard = null;
                    secondCard = null;

                    lock = false;

                    // ステージクリア
                    if(matched >= selected.length){

                        clearInterval(timer);

                        lock = true;

                        document.getElementById("message").textContent =
                        "🎉 ステージクリア！";

                        stage++;

                        startButton.textContent =
                        "次のステージへ";

                        startButton.style.display =
                        "block";
                    }

                }else{

                    document.getElementById("message").textContent =
                    "❌ ミス！";

                    setTimeout(() => {

                        firstCard.innerHTML = "";
                        secondCard.innerHTML = "";

                        firstCard = null;
                        secondCard = null;

                        lock = false;

                    },800);

                }

            }

        };

        game.appendChild(card);

    });

}

startButton.onclick = () => {

    time = 60;

    updateUI();

    startButton.style.display = "none";

    document.getElementById("message").textContent = "";

    lock = false;

    createStage();

    startTimer();

};

updateUI();

</script>

</body>
</html>
