<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>だし神経衰弱</title>
    
<style>

#tipsBar{

    font-size:11px;

    color:#7f766d;

    letter-spacing:0.08em;

    padding:10px 0;

    overflow:hidden;

    white-space:nowrap;

    border-bottom:
    1px solid rgba(60,40,30,0.06);
}

body{

    background-color:#f6f1e7;

    background-image:

    radial-gradient(
        rgba(200,162,77,0.06) 1px,
        transparent 1px
    ),

    radial-gradient(
        rgba(255,255,255,0.5) 1px,
        transparent 1px
    );

    background-size:
    24px 24px,
    18px 18px;

    background-position:
    0 0,
    12px 12px;

    color:#3b312b;

    text-align:center;
    margin:0;
    padding:20px;

    font-family:
    'Noto Sans JP',
    sans-serif;

    line-height:1.7;
}
    
h1{
    color:#3a2b24;
}

#status{
    display:flex;
    justify-content:center;
    gap:10px;

    flex-wrap:nowrap;

    margin:30px auto;

    width:100%;
    max-width:420px;
}
    
#game{
    display:grid;
    gap:10px;
    justify-content:center;
    margin-top:20px;
    align-items: center;
}

.title{

    font-family:
    'Shippori Mincho',
    serif;

    font-size:34px;

    letter-spacing:0.12em;

    font-weight:700;

    margin-top:42px;

    color:#3b312b;
}

.subtitle{

    font-size:11px;

    letter-spacing:0.35em;

    color:#8a8278;

    margin-top:10px;

    margin-bottom:42px;
}
    
.card{
    width:110px;
    height:110px;
    background:
        linear-gradient(
            180deg,
            #74695f 0%,
            #5f554d 100%
        );
    border-radius:16px;
    border:
    1px solid rgba(60,40,30,0.08);
    box-shadow:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    transition:0.2s;
    aspect-ratio: 1 / 1;
    box-sizing: border-box;
    flex-shrink: 0;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

#message{

    margin-top:28px;
    font-size:14px;
    font-weight:400;
    letter-spacing:0.08em;
    color:#7f766d;
    min-height:40px;
}
    
.button{

    border:none;

    border-radius:18px;

    padding:14px 18px;

    font-size:15px;

    font-weight:500;

    letter-spacing:0.04em;

    transition:0.2s;

    box-shadow:none;
}

.button:hover{
    transform:translateY(-2px);
}

.status-box{

    flex:1;

    background:
    rgba(255,255,255,0.55);

    border:
    1px solid rgba(80,60,40,0.08);

    border-radius:22px;

    padding:16px 10px;

    backdrop-filter:blur(6px);
}

.status-title{

    font-size:11px;

    letter-spacing:0.08em;

    color:#8a8278;

    margin-bottom:8px;
}

.status-value{

    font-size:24px;

    font-weight:500;

    color:#3b312b;
}
    
#startButton{
    width:82%;
    max-width:340px;
    margin:26px auto;
    padding:18px 20px;
    letter-spacing:0.18em;
    background:#7a8e63 !important;
    color:#ffffff !important;
    font-weight:bold; 
}


#difficultyButtons{

    display:flex;
    justify-content:center;
    gap:8px;

    flex-wrap:nowrap;

    margin-top:30px;
    margin-bottom:20px;

    width:100%;
    max-width:420px;

    margin-left:auto;
    margin-right:auto;
}

#difficultyButtons .button{
    margin:0;
}

.beginner{
    background:#efe7d8;
    color:#4b413c;
}

.middle{
    background:#c8a24d;
    color:#fffdf8;
}

.hard{
    background:#5c4a42;
    color:#fffdf8;
}

.pro{
    background:#3b312b;
    color:#fffdf8;
}

#zukanButton{

    background:transparent;

    border:
    1px solid rgba(60,40,30,0.15);

    color:#4b413c;
}

#zukanButton:hover{

    background:
    rgba(255,255,255,0.4);
}
    
@media screen and (max-width:700px){

    .card{
        width:72px;
        height:72px;
    }

    #status{
        font-size:15px;
    }

    #status{
    gap:8px;
    }

    .status-box{
    border-radius:14px;
    }
    
    .status-title{
    font-size:11px;
    }
    
    .status-value{
    font-size:20px;
    }

}

@keyframes glow {

0%{
transform:scale(1);
opacity:0.9;
}

50%{
transform:scale(1.02);
opacity:1;
}

100%{
transform:scale(1);
opacity:0.9;
}

}
    
.card.glow {
    animation: glow 0.5s ease;
}
    
</style>
</head>

<body>

<div id="tipsBar">
    <div id="tipsText"></div>
</div>
    
<h1 class="title">
    だし神経衰弱
</h1>

<div class="subtitle">
    DASHI MEMORY
</div>

<div id="status">

    <div class="status-box">
        <div class="status-title">難易度</div>
        <div class="status-value" id="difficulty">-</div>
    </div>

    <div class="status-box">
        <div class="status-title">残り時間</div>
        <div class="status-value">
            <span id="time">60</span>秒
        </div>
    </div>

    <div class="status-box">
        <div class="status-title">スコア</div>
        <div class="status-value" id="score">0</div>
    </div>

</div>

<div id="message">
難易度を選んでね！
</div>

<div id="difficultyButtons">
    <button class="button beginner"
onclick="selectDifficulty('beginner')">
    初級
    </button>

    <button class="button middle"
onclick="selectDifficulty('middle')">
    中級
    </button>

    <button class="button hard"
onclick="selectDifficulty('hard')">
    上級
    </button>

    <button class="button pro"
onclick="selectDifficulty('pro')">
    達人
    </button>
</div>

<button id="startButton" class="button" style="display:none;">
ゲームスタート
</button>

<div id="game"></div>

<button id="zukanButton" class="button" onclick="goToZukan()"> 
📖 出汁図鑑 
</button>

    
<script>

const tips = [

"💡 上級は“写真”と“文字入り画像”のペア！",
"💡 達人モードは画像と文字を結びつけよう！",
"💡 レアアイテムが出現することも…！",
"💡 真昆布は上品な甘みが特徴！",
"💡 あご煮干は飛魚から作られるよ！",
"💡 宗田節は力強いコクが特徴！",
"💡 図鑑で見つけた素材を確認できる！"

];

function changeTip(){

    const randomTip =
    tips[Math.floor(Math.random() * tips.length)];

    document.getElementById("tipsText").textContent =
    randomTip;

}

changeTip();

setInterval(changeTip, 18000);
    
const items = [

{name:"真昆布", image:"makonbu", category:"other"},
{name:"羅臼昆布", image:"rausukonbu", category:"other"},
{name:"椎茸", image:"shitake", category:"other"},
{name:"イタヤ貝", image:"itayagai", category:"other"},
{name:"むきえび", image:"mukiebi", category:"other"},
{name:"素干えび", image:"suboshiebi", category:"other"},
{name:"いか下足", image:"ikageso", category:"other"},
{name:"ばら海苔", image:"baranori", category:"other"},
{name:"焼き海苔", image:"yakinori", category:"other"},

{name:"あご煮干", image:"ago", category:"niboshi"},
{name:"あじ煮干", image:"aji", category:"niboshi"},
{name:"えそ煮干", image:"eso", category:"niboshi"},
{name:"平子煮干", image:"hirako", category:"niboshi"},
{name:"いか煮干", image:"ika", category:"niboshi"},
{name:"片口煮干", image:"katakuchi", category:"niboshi"},
{name:"さんま煮干", image:"sanma", category:"niboshi"},
{name:"白口煮干", image:"shirokuchi", category:"niboshi"},
{name:"たい煮干", image:"tai", category:"niboshi"},
{name:"かき煮干", image:"kaki", category:"niboshi"},
{name:"さば煮干", image:"saba", category:"niboshi"},
{name:"うるめ煮干", image:"urume", category:"niboshi"},

{name:"かつお枯節", image:"katsuo-karebushi", category:"fushi"},
{name:"かつお荒節", image:"katsuo-arabushi", category:"fushi"},
{name:"宗田枯節", image:"souda-karebushi", category:"fushi"},
{name:"宗田荒節", image:"souda-arabushi", category:"fushi"},
{name:"さば枯節", image:"saba-karebushi", category:"fushi"},
{name:"さば荒節", image:"saba-arabushi", category:"fushi"},
{name:"むろあじ節", image:"muroajibushi", category:"fushi"},
{name:"さんま節", image:"sanmabushi", category:"fushi"},
{name:"うるめ節", image:"urumebushi", category:"fushi"},
{name:"平子節", image:"hirakobushi", category:"fushi"},

{name:"だしパック「極丸」", image:"kiwamaru", category:"item"},
{name:"わんこ節", image:"wankobushi", category:"item"},
{name:"削り器", image:"kezuriki", category:"item"},
{name:"鰹出汁の冷やしラーメン", image:"ramen", category:"item"},
{name:"鰹出汁がしみたおでん", image:"oden", category:"item"},
{name:"鰹節ふりかけのTKG", image:"tkg", category:"item"}

];

const settings = {

    beginner:{
        pairs:6,
        columns:4,
        text:true
    },

    middle:{
        pairs:8,
        columns:4,
        text:true
    },

    hard:{
        pairs:10,
        columns:4,
        text:false
    },

    pro:{
        pairs:10,
        columns:4,
        text:false,
        mixed:true
    }

};

const game = document.getElementById("game");
const startButton = document.getElementById("startButton");

let selectedDifficulty = "";

let score = 0;
let time = 60;

let timer;

let firstCard = null;
let secondCard = null;

let lock = true;
    
let matched = 0;
let discovered = JSON.parse(localStorage.getItem("discovered")) || [];
let currentDiscovered = [];

function updateUI(){

    document.getElementById("score").textContent = score;
    document.getElementById("time").textContent = time;

}

function selectDifficulty(level){

    clearInterval(timer);

    time = 60; 
    
    updateUI();
    
    selectedDifficulty = level;

    const names = {
        beginner:"初級",
        middle:"中級",
        hard:"上級",
        pro:"達人"
    };

    document.getElementById("difficulty").textContent =
    names[level];

    document.getElementById("message").textContent =
    "スタートボタンを押してね！";

    startButton.textContent = "ゲームスタート";

    startButton.style.display = "block";

    score = 0;

    lock = false;

    firstCard = null;
    secondCard = null;

    game.innerHTML = "";

    updateUI();

}


function startTimer(){

    clearInterval(timer);

    timer = setInterval(() => {

        time--;

        updateUI();

        if(time <= 0){

            clearInterval(timer);

            lock = true;

            document.getElementById("message").textContent =
            "⏰ ゲームオーバー！";

            startButton.textContent = "もう一回！";

            startButton.style.display = "block";

        }

    },1000);

}

function createStage(){

    const stage = settings[selectedDifficulty];

    game.style.gridTemplateColumns =
    `repeat(${stage.columns}, auto)`;

    matched = 0;

    currentDiscovered = [];

    firstCard = null;
    secondCard = null;

    game.innerHTML = "";

    let pool = [];

if(selectedDifficulty === "beginner"){

    pool = items.filter(item =>
        item.category === "other"
        || item.category === "niboshi"
    );

    // 5%でアイテム追加
    if(Math.random() < 0.05){

        const rareItems =
        items.filter(item =>
        item.category === "item"
        );

        pool.push(...rareItems);

    }

}

else if(selectedDifficulty === "middle"){

    pool = items.filter(item =>
        item.category === "niboshi"
        || item.category === "fushi"
    );

    // 10%でアイテム追加
    if(Math.random() < 0.1){

        const rareItems =
        items.filter(item =>
        item.category === "item"
        );

        pool.push(...rareItems);

    }

}

else if(selectedDifficulty === "hard"){

    pool = items.filter(item =>
        item.category === "other"
        || item.category === "niboshi"
        || item.category === "fushi"
    );

    // 15%でアイテム追加
    if(Math.random() < 0.15){

        const rareItems =
        items.filter(item =>
        item.category === "item"
        );

        pool.push(...rareItems);

    }

}

else if(selectedDifficulty === "pro"){

    pool = items.filter(item =>
        item.category === "fushi"
    );

    // 30%でアイテム追加
    if(Math.random() < 0.3){

        const rareItems =
        items.filter(item =>
            item.category === "item"
        );

        pool.push(...rareItems);

    }

}

const selectedItems =
[...pool]
.sort(() => Math.random() - 0.5)
.slice(0, stage.pairs);

let cards = [];

if(stage.mixed){

    selectedItems.forEach(item => {

    // レアアイテムだけ特殊
    if(item.category === "item"){

        cards.push({
            ...item,
            cardType:"text"
        });

        cards.push({
            ...item,
            cardType:"text"
        });

    }else{

        cards.push({
            ...item,
            cardType:"image"
        });

        cards.push({
            ...item,
            cardType:"moji"
        });

    }

});

}else{

    cards =
    [...selectedItems, ...selectedItems];

}

cards.sort(() => Math.random() - 0.5);

    cards.forEach(item => {

        const card = document.createElement("div");

        card.classList.add("card");

        card.dataset.name = item.name;

        card.onclick = () => {

            if(lock) return;

            if(card === firstCard) return;

            if(card.classList.contains("matched")) return;

            let imagePath = "";

            if(stage.mixed){

    if(item.cardType === "moji"){

    imagePath =
    `images/${item.image}-moji.jpg`;

}else if(item.cardType === "text"){

    imagePath =
    `images/${item.image}-text.jpg`;

}else{

    imagePath =
    `images/${item.image}.jpg`;

}

}else if(stage.text){

    imagePath =
    `images/${item.image}-text.jpg`;

}else{

    imagePath =
    `images/${item.image}.jpg`;

}

            card.innerHTML =
            `<img src="${imagePath}">`;

            if(!firstCard){

                firstCard = card;

            }else{

                secondCard = card;

                lock = true;

if(firstCard.dataset.name === secondCard.dataset.name){

    firstCard.classList.add("glow");
    secondCard.classList.add("glow");

    score += 100;
    matched++;

    updateUI();

    document.getElementById("message").textContent =
    "⭕ 正解！";

    if(!currentDiscovered.includes(item.name)){

    currentDiscovered.push(item.name);

}

    const card1 = firstCard;
    const card2 = secondCard;

    firstCard = null;
    secondCard = null;

    setTimeout(() => {

    card1.classList.remove("glow");
    card2.classList.remove("glow");

    card1.classList.add("matched");
    card2.classList.add("matched");

    lock = false;

    if(matched >= stage.pairs){

        clearInterval(timer);

        lock = true;


currentDiscovered.forEach(name => {

    if(!discovered.includes(name)){

        discovered.push(name);

    }

});

localStorage.setItem(
    "discovered",
    JSON.stringify(discovered)
);
        
        document.getElementById("message").textContent =
        "🎉 クリア！";

        startButton.textContent =
        "もう一回遊ぶ";

        startButton.style.display = "block";

    }

},500);


}else{

    document.getElementById("message").textContent =
    "❌ ミス！";

    setTimeout(() => {

        firstCard.innerHTML = "";
        secondCard.innerHTML = "";

        firstCard = null;
        secondCard = null;

        lock = false;

    },1000);

}

            }

        };


        game.appendChild(card);

    });

}

    
startButton.onclick = () => {

    if(!selectedDifficulty) return;

    time = 60;

    updateUI();

    lock = false;

    startButton.style.display = "none";

    document.getElementById("message").textContent = "";

    createStage();

    startTimer();

};

updateUI();

function goToZukan(){

    clearInterval(timer);

    location.href = "zukan.html";

}


</script>

</body>
</html>
