<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>だし神経衰弱</title>

<style>
body{
    font-family:sans-serif;
    background:#f6f1e8;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{ color:#3b2a22; }

#status{
    margin:15px;
    font-size:18px;
    line-height:1.8;
}

#game{
    display:grid;
    gap:10px;
    justify-content:center;
    margin-top:20px;
}

.card{
    width:110px;
    height:110px;
    background:#b85c38;
    border-radius:10px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    transition:0.2s;
}

.card:hover{ transform:scale(1.03); }

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

#message{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    min-height:40px;
}

.button{
    margin:10px auto;
    padding:14px 24px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#d8a31a;
    color:#24324a;
    cursor:pointer;
    display:block;
}

#startButton{
    background:#6e8b5b !important;
    color:white !important;
    font-weight:bold; 
}

#difficultyButtons{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:10px;
}

@keyframes glow{
    0%{ box-shadow:0 0 0px rgba(255,215,0,0); transform:scale(1);}
    50%{ box-shadow:0 0 20px rgba(255,215,0,0.9); transform:scale(1.05);}
    100%{ box-shadow:0 0 0px rgba(255,215,0,0); transform:scale(1);}
}

.card.glow{ animation:glow 0.5s ease; }
</style>
</head>

<body>

<h1>だし神経衰弱</h1>

<div id="status">
難易度: <span id="difficulty">-</span><br>
ステージ: <span id="stage">1</span> / 6<br>
時間: <span id="time">60</span>秒<br>
スコア: <span id="score">0</span>
</div>

<div id="message">難易度を選んでね！</div>

<div id="difficultyButtons">
<button class="button" onclick="selectDifficulty('beginner')">初級</button>
<button class="button" onclick="selectDifficulty('middle')">中級</button>
<button class="button" onclick="selectDifficulty('hard')">上級</button>
</div>

<button id="startButton" class="button" style="display:none;">ゲームスタート</button>

<button class="button" onclick="location.href='zukan.html'">📖 出汁図鑑</button>

<div id="game"></div>

<script>

const difficulties = {
beginner:[
{name:"だしパック「極丸」",image:"kiwamaru"},
{name:"羅臼昆布",image:"rausukonbu"},
{name:"真昆布",image:"makonbu"},
{name:"椎茸",image:"shitake"},
{name:"イタヤ貝",image:"itayagai"},
{name:"むきえび",image:"mukiebi"},
{name:"素干えび",image:"suboshiebi"},
{name:"いか下足",image:"ikageso"},
{name:"ばら海苔",image:"baranori"},
{name:"焼き海苔",image:"yakinori"}
],
middle:[ /* そのまま */ ],
hard:[ /* そのまま */ ]
};

const forcedItems = {
beginner:{name:"だしパック「極丸」",image:"kiwamaru"},
middle:{name:"たい煮干",image:"tai"},
hard:{name:"かつお枯節",image:"katsuo-karebushi"}
};

const stages=[
{pairs:6,columns:4,text:true},
{pairs:8,columns:4,text:true},
{pairs:10,columns:4,text:true},
{pairs:6,columns:4,text:false},
{pairs:8,columns:4,text:false},
{pairs:10,columns:4,text:false}
];

let selectedDifficulty="";
let currentStage=0;
let score=0;
let time=60;
let timer;

let firstCard=null;
let secondCard=null;
let lock=true;

let matched=0;
let discovered=JSON.parse(localStorage.getItem("discovered"))||[];

const game=document.getElementById("game");
const startButton=document.getElementById("startButton");

function updateUI(){
document.getElementById("score").textContent=score;
document.getElementById("time").textContent=time;
document.getElementById("stage").textContent=currentStage+1;
}

function selectDifficulty(level){
clearInterval(timer);
selectedDifficulty=level;
currentStage=0;
score=0;
time=60;
updateUI();

document.getElementById("difficulty").textContent=level;
document.getElementById("message").textContent="スタートを押してね";

startButton.style.display="block";
startButton.textContent="ゲームスタート";
}

function startTimer(){
clearInterval(timer);
timer=setInterval(()=>{
time--;
updateUI();
if(time<=0){
clearInterval(timer);
lock=true;
document.getElementById("message").textContent="ゲームオーバー";
startButton.style.display="block";
}
},1000);
}

function createStage(){

const stage=stages[currentStage];

game.style.gridTemplateColumns=`repeat(${stage.columns},auto)`;

matched=0;
firstCard=null;
secondCard=null;
game.innerHTML="";

let pool=[...difficulties[selectedDifficulty]]
.sort(()=>Math.random()-0.5);

let items;

if(currentStage===5){
const forced=forcedItems[selectedDifficulty];
pool=pool.filter(i=>i.name!==forced.name);
items=[forced,forced,...pool].slice(0,stage.pairs);
}else{
items=pool.slice(0,stage.pairs);
}

const cards=[...items,...items].sort(()=>Math.random()-0.5);

cards.forEach(item=>{
const card=document.createElement("div");
card.classList.add("card");
card.dataset.name=item.name;

card.onclick=()=>{

if(lock) return;
if(card===firstCard) return;
if(card.classList.contains("matched")) return;

let img=stage.text?
`images/${item.image}-text.jpg`:
`images/${item.image}.jpg`;

card.innerHTML=`<img src="${img}">`;

if(!firstCard){
firstCard=card;
}else{
secondCard=card;
lock=true;

if(firstCard.dataset.name===secondCard.dataset.name){

firstCard.classList.add("glow");
secondCard.classList.add("glow");

score+=100;
matched++;

if(!discovered.includes(item.name)){
discovered.push(item.name);
localStorage.setItem("discovered",JSON.stringify([...new Set(discovered)]));
}

document.getElementById("message").textContent="⭕ 正解！";

const c1=firstCard;
const c2=secondCard;

setTimeout(()=>{
c1.classList.remove("glow");
c2.classList.remove("glow");

c1.classList.add("matched");
c2.classList.add("matched");

c1.innerHTML="";
c2.innerHTML="";

firstCard=null;
secondCard=null;
lock=false;
},500);

}else{

document.getElementById("message").textContent="❌ ミス！";

setTimeout(()=>{
firstCard.innerHTML="";
secondCard.innerHTML="";
firstCard=null;
secondCard=null;
lock=false;
},1000);
}
}
};

game.appendChild(card);
});
}

startButton.onclick=()=>{
if(!selectedDifficulty) return;

time=60;
score=0;
updateUI();

lock=false;
startButton.style.display="none";
document.getElementById("message").textContent="";

createStage();
startTimer();
};

updateUI();

</script>
</body>
</html>
