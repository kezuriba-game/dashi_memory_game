<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>だし神経衰弱</title>

<style>
body{
    font-family:sans-serif;
    background:#f4f1ea;
    text-align:center;
}

h1{
    margin-top:20px;
    color:#333;
}

#status{
    margin:15px;
    font-size:20px;
}

#game{
    display:grid;
    grid-template-columns:repeat(4,140px);
    gap:12px;
    justify-content:center;
}

.card{
    width:140px;
    height:140px;
    background:#2c3e50;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

#message{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
    color:#444;
}
</style>
</head>

<body>

<h1>🐟 だし神経衰弱</h1>

<div id="status">
⏱ 残り時間: <span id="time">60</span>秒　
🏆 スコア: <span id="score">0</span>
</div>

<div id="game"></div>

<div id="message"></div>

<script>

const allItems = [
  {name:"あご煮干", image:"images/ago.png"},
  {name:"あじ煮干", image:"images/aji.png"},
  {name:"エソ煮干", image:"images/eso.png"},
  {name:"平子煮干", image:"images/hirako.png"},
  {name:"イカ煮干", image:"images/ika.png"},
  {name:"片口煮干", image:"images/katakuchi.png"},
  {name:"さんま煮干", image:"images/sanma.png"},
  {name:"白口煮干", image:"images/shirokuchi.png"}
];

const game = document.getElementById("game");

let firstCard = null;
let secondCard = null;
let lock = false;
let score = 0;
let matched = 0;
let time = 60;

function updateUI(){
    document.getElementById("score").textContent = score;
    document.getElementById("time").textContent = time;
}

const timer = setInterval(() => {

    if(lock && time <= 0) return;

    time--;

    updateUI();

    if(time <= 0){

        clearInterval(timer);

        document.getElementById("message").textContent =
        "ゲームオーバー！";

        lock = true;
    }

},1000);

function startStage(){

    matched = 0;

    game.innerHTML = "";

    firstCard = null;
    secondCard = null;

    lock = false;

    const shuffled = [...allItems]
    .sort(() => Math.random() - 0.5);

    const selected = shuffled.slice(0,8);

    const cards = [...selected, ...selected]
    .sort(() => Math.random() - 0.5);

    cards.forEach(item => {

        const card = document.createElement("div");

        card.classList.add("card");

        card.dataset.name = item.name;

        card.onclick = () => {

            if(lock) return;

            if(card === firstCard) return;

            if(card.classList.contains("matched")) return;

            card.innerHTML = `<img src="${item.image}">`;

            if(!firstCard){

                firstCard = card;

            }else{

                secondCard = card;

                lock = true;

                if(firstCard.dataset.name === secondCard.dataset.name){

                    firstCard.classList.add("matched");
                    secondCard.classList.add("matched");

                    score += 100;
                    matched++;

                    updateUI();

                    document.getElementById("message").textContent =
                    "正解！";

                    firstCard = null;
                    secondCard = null;
                    lock = false;

                    if(matched >= selected.length){

                        document.getElementById("message").textContent =
                        "🎉ステージクリア！🎉";

                        setTimeout(() => {
                            startStage();
                        },1500);
                    }

                }else{

                    document.getElementById("message").textContent =
                    "ミス！";

                    setTimeout(() => {

                        firstCard.innerHTML = "";
                        secondCard.innerHTML = "";

                        firstCard = null;
                        secondCard = null;

                        lock = false;

                    },800);
                }
            }
        };

        game.appendChild(card);
    });

    updateUI();
}

startStage();

</script>

</body>
</html>
