0%{
transform:scale(1);
opacity:0.9;
}

50%{
transform:scale(1.12);
opacity:1;
}

100%{

opacity:0.9;
}

<script>

const tips = [

"💡 達人モードは画像と文字のペアをそろえよう！",

document.getElementById("tipsText").textContent =

const items = [

{name:"あご煮干", image:"ago", category:"niboshi"},

{name:"かつお荒節", image:"katsuo-arabushi", category:"fushi"},
{name:"宗田枯節", image:"souda-karebushi", category:"fushi"},
{name:"宗田荒節", image:"souda-arabushi", category:"fushi"},
{name:"さば枯節", image:"saba-karebushi", category:"fushi"},
{name:"さば荒節", image:"saba-arabushi", category:"fushi"},
{name:"むろあじ節", image:"muroajibushi", category:"fushi"},
{name:"さんま節", image:"sanmabushi", category:"fushi"},
{name:"うるめ節", image:"urumebushi", category:"fushi"},
{name:"平子節", image:"hirakobushi", category:"fushi"},

{name:"かつお枯節厚削り", image:"katsuo-karebushi-atsukezuri", category:"atsukezuri"},
{name:"宗田枯節厚削り", image:"souda-karebushi-atsukezuri", category:"atsukezuri"},
{name:"さば枯節厚削り", image:"saba-karebushi-atsukezuri", category:"atsukezuri"},
{name:"枯節あわせ厚削り", image:"karebushi-awase-atsukezuri", category:"atsukezuri"},
{name:"かつお荒節厚削り", image:"katsuo-arabushi-atsukezuri", category:"atsukezuri"},
{name:"宗田荒節厚削り", image:"souda-arabushi-atsukezuri", category:"atsukezuri"},
{name:"さば荒節厚削り", image:"saba-arabushi-atsukezuri", category:"atsukezuri"},
{name:"荒節あわせ厚削り", image:"arabushi-awase-atsukezuri", category:"atsukezuri"},
{name:"むろあじ節厚削り", image:"muroaji-atsukezuri", category:"atsukezuri"},
{name:"うるめ節厚削り", image:"urume-atsukezuri", category:"atsukezuri"},
{name:"さんま節厚削り", image:"sanma-atsukezuri", category:"atsukezuri"},

{name:"かつお枯節薄削り", image:"katsuo-karebushi-usukezuri", category:"usukezuri"},
{name:"かつお荒節薄削り", image:"katsuo-arabushi-usukezuri", category:"usukezuri"},
{name:"さば節薄削り", image:"saba-usukezuri", category:"usukezuri"},
{name:"いわし節薄削り", image:"iwashi-usukezuri", category:"usukezuri"},
{name:"荒節あわせ薄削り", image:"arabushi-awase-usukezuri", category:"usukezuri"},
{name:"花吹雪", image:"hanahubuki", category:"usukezuri"},
{name:"糸削り", image:"itokezuri", category:"usukezuri"},

{name:"かつお節粉末", image:"katsuo-kona", category:"kona"},
{name:"宗田節粉末", image:"souda-kona", category:"kona"},
{name:"さば節粉末", image:"saba-kona", category:"kona"},
{name:"荒節あわせ粉末", image:"arabushi-awase-kona", category:"kona"},
{name:"煮干し粉末", image:"niboshi-kona", category:"kona"},
{name:"うるめ節粉末", image:"urume-kona", category:"kona"},
{name:"焼きあご粉末", image:"yakiago-kona", category:"kona"},

{name:"だしパック「極丸」", image:"kiwamaru", category:"item"},
{name:"わんこ節", image:"wankobushi", category:"item"},
{name:"削り器", image:"kezuriki", category:"item"},
{name:"鰹出汁の冷やしラーメン", image:"hiyashiramen", category:"item"},
{name:"鰹出汁しみしみ冷やしおでん", image:"hiyashioden", category:"item"},
{name:"鰹節たっぷりお好み焼き", image:"okonomiyaki", category:"item"}

];

const settings = {

    beginner:{
        pairs:8,
        columns:4,
        text:true
    },

    middle:{
        pairs:8,
        columns:4,
        text:true
    },

    hard:{
        pairs:8,
        columns:4,
        text:true
    },

    pro:{
        pairs:10,
        columns:4,
        text:false
    },

    master:{
    pairs:10,
    columns:4,
    mixed:true
    },

    challenge:{
        pairs:10,
        columns:4,
        text:false,
        mixed:true,
        time:40
    }

};

const game = document.getElementById("game");
const startButton = document.getElementById("startButton");

let selectedDifficulty = "";

let time = 60;

let timer;

let firstCard = null;
let secondCard = null;

let lock = true;
    
let matched = 0;
let discovered = JSON.parse(localStorage.getItem("discovered")) || [];
let currentDiscovered = [];

let gameOver = false;

function updateUI(){

    document.getElementById("time").textContent = time;

}

function selectDifficulty(level){

    clearInterval(timer);
    
    time =
    settings[level].time || 60;
    
    updateUI();
    
    selectedDifficulty = level;

    document
    .querySelectorAll(
    "#difficultyButtons button, .challenge"
    )
    .forEach(btn =>
    btn.classList.remove("selectedDifficulty")
    );

    const buttonMap = {
        
    beginner:"beginnerBtn",
    middle:"middleBtn",
    hard:"hardBtn",
    pro:"proBtn",
    master:"masterBtn",
    challenge:"challengeBtn"
    
    };
    
    document
    .getElementById(buttonMap[level])
    .classList.add("selectedDifficulty");

    const names = {
    beginner:"初級",
    middle:"中級",
    hard:"上級",
    pro:"達人",
    master:"名人",
    challenge:"挑戦"
    };

    document.getElementById("difficulty").textContent =
    names[level];

    document.getElementById("message").textContent =
    "スタートボタンを押してね！";

    startButton.textContent = "ゲームスタート";

    startButton.style.display = "block";

    lock = false;

    firstCard = null;
    secondCard = null;

    game.innerHTML = "";

    updateUI();

}


function startTimer(){

    clearInterval(timer);

    timer = setInterval(() => {

        time--;

        updateUI();

        if(time <= 0){
            
            clearInterval(timer);
            gameOver = true;
            lock = true;

            document.getElementById("message").textContent =
            "⏰ ゲームオーバー！";

            startButton.textContent = "もう一回！";

            startButton.style.display = "block";

        }

    },1000);

}

function createStage(){

    const stage = settings[selectedDifficulty];

    game.style.gridTemplateColumns =
    `repeat(${stage.columns}, auto)`;

    matched = 0;

    currentDiscovered = [];

    firstCard = null;
    secondCard = null;

    game.innerHTML = "";

    let pool = [];

    let rareAppeared = false;

if(selectedDifficulty === "beginner"){

    pool = items.filter(item =>
        item.category === "other"
        || item.category === "niboshi"
    );

}

else if(selectedDifficulty === "middle"){

    pool = items.filter(item =>
        item.category === "fushi"
        || item.category === "usukezuri"
    );

}

else if(selectedDifficulty === "hard"){

    pool = items.filter(item =>
        item.category === "atsukezuri"
        || item.category === "kona"
    );

}

else if(selectedDifficulty === "pro"){

    pool = items.filter(item =>
        item.category !== "item"
    );

}

else if(selectedDifficulty === "master"){

    pool = items.filter(item =>
        item.category !== "item"
    );

}

else if(selectedDifficulty === "challenge"){

    pool = items.filter(item =>
        item.category === "fushi"
        || item.category === "usukezuri"
        || item.category === "atsukezuri"
        || item.category === "kona"
    );

}

const rareItems =
items.filter(item =>
    item.category === "item"
);

let selectedItems = [];

// 初級
if(selectedDifficulty === "beginner"){

    selectedItems =
    [...pool]
    .sort(() => Math.random() - 0.5)
    .slice(0, stage.pairs);

    if(Math.random() < 0.05){

    rareAppeared = true;

    selectedItems.pop();
    selectedItems.push(
        rareItems[
            Math.floor(
                Math.random()*rareItems.length
            )
        ]
    );
}

}

// 中級
else if(selectedDifficulty === "middle"){

    selectedItems =
    [...pool]
    .sort(() => Math.random() - 0.5)
    .slice(0, stage.pairs);

    if(Math.random() < 0.10){

    rareAppeared = true;

    selectedItems.pop();
    selectedItems.push(
        rareItems[
            Math.floor(
                Math.random()*rareItems.length
            )
        ]
    );
}

}

// 上級
else if(selectedDifficulty === "hard"){

    selectedItems =
    [...pool]
    .sort(() => Math.random() - 0.5)
    .slice(0, stage.pairs);

    if(Math.random() < 0.15){

    rareAppeared = true;

    selectedItems.pop();
    selectedItems.push(
        rareItems[
            Math.floor(
                Math.random()*rareItems.length
            )
        ]
    );
}
}

// 達人
else if(selectedDifficulty === "pro"){

    rareAppeared = true;

    selectedItems =
    [...pool]
    .sort(() => Math.random() - 0.5)
    .slice(0, stage.pairs - 1);

    selectedItems.push(
        rareItems[
            Math.floor(
                Math.random()*rareItems.length
            )
        ]
    );

}

// 名人
else if(selectedDifficulty === "master"){

    rareAppeared = true;

    selectedItems =
    [...pool]
    .sort(() => Math.random() - 0.5)
    .slice(0, stage.pairs - 2);

    const shuffledRare =
    [...rareItems]
    .sort(() => Math.random() - 0.5);

    selectedItems.push(shuffledRare[0]);
    selectedItems.push(shuffledRare[1]);

}

// 挑戦
else{

    selectedItems =
    [...pool]
    .sort(() => Math.random() - 0.5)
    .slice(0, stage.pairs);

}
    

let cards = [];

if(stage.mixed){

    selectedItems.forEach(item => {

    // レアアイテムだけ特殊
    if(item.category === "item"){

        cards.push({
            ...item,
            cardType:"text"
        });

        cards.push({
            ...item,
            cardType:"text"
        });

    }else{

        cards.push({
            ...item,
            cardType:"image"
        });

        cards.push({
            ...item,
            cardType:"moji"
        });

    }

});

}else{

    cards =
    [...selectedItems, ...selectedItems];

}

cards.sort(() => Math.random() - 0.5);

    cards.forEach(item => {

        const card = document.createElement("div");

        card.classList.add("card");

        card.dataset.name = item.name;

        card.onclick = () => {

            if(lock) return;

            if(card === firstCard) return;

            if(card.classList.contains("matched")) return;

            let imagePath = "";

            if(stage.mixed){

    if(item.cardType === "moji"){

    imagePath =
    `images/${item.image}-moji.jpg`;

}else if(item.cardType === "text"){

    imagePath =
    `images/${item.image}-text.jpg`;

}else{

    imagePath =
    `images/${item.image}.jpg`;

}

}else if(stage.text){

    imagePath =
    `images/${item.image}-text.jpg`;

}else{

    imagePath =
    `images/${item.image}.jpg`;

}

            card.innerHTML =
            `<img src="${imagePath}">`;

            if(!firstCard){

                firstCard = card;

            }else{

                secondCard = card;

                lock = true;

if(firstCard.dataset.name === secondCard.dataset.name){

    firstCard.classList.add("glow");
    secondCard.classList.add("glow");

    matched++;

    updateUI();

    document.getElementById("message").textContent =
    "⭕ 正解！";

    if(!currentDiscovered.includes(item.name)){

    currentDiscovered.push(item.name);

}

    const card1 = firstCard;
    const card2 = secondCard;

    firstCard = null;
    secondCard = null;

    setTimeout(() => {

    card1.classList.remove("glow");
    card2.classList.remove("glow");

    card1.classList.add("matched");
    card2.classList.add("matched");
        
    if(!gameOver){
        lock = false;
    }

    if(matched >= stage.pairs){

        clearInterval(timer);

        lock = true;


currentDiscovered.forEach(name => {

    if(!discovered.includes(name)){

        discovered.push(name);

    }

});

localStorage.setItem(
    "discovered",
    JSON.stringify(discovered)
);
        
        document.getElementById("message").textContent =
        "おめでとう！ステージクリア！";

        showResultModal();

        startButton.textContent =
        "もう一回遊ぶ";

        startButton.style.display = "block";

    }

},500);


}else{

    document.getElementById("message").textContent =
    "❌ ミス！";

    setTimeout(() => {

        firstCard.innerHTML = "";
        secondCard.innerHTML = "";

        firstCard = null;
        secondCard = null;
        
        if(!gameOver){
            lock = false;
        }

    },1000);

}

            }

        };


        game.appendChild(card);

    });

if(rareAppeared){

    document.getElementById("message").textContent =
    "✨レアアイテム出現！";

    document.getElementById("message").style.color =
    "#c8a24d";

    setTimeout(() => {

        document.getElementById("message").textContent =
        "";

        document.getElementById("message").style.color =
        "#7a8e63";

    },2500);

}

}

    
startButton.onclick = () => {

    if(!selectedDifficulty) return;
    gameOver = false;
    time =
    settings[selectedDifficulty].time || 60;

    updateUI();

    lock = false;

    startButton.style.display = "none";

    document.getElementById("message").textContent = "";

    createStage();

    startTimer();

};

updateUI();

function goToZukan(){

    clearInterval(timer);

    location.href = "zukan.html";

}

function showResultModal(){

    document.getElementById("resultModal")
    .style.display = "flex";

    document.getElementById("resultText")
    .innerHTML = `
    難易度：${document.getElementById("difficulty").textContent}<br>
    残り時間：${time}秒
    `;

}

function closeModal(){

    document.getElementById("resultModal")
    .style.display = "none";

}

function shareResult(){

const difficulty =
document.getElementById("difficulty").textContent;

const text =
`だし神経衰弱をクリアしました！

難易度：${difficulty}
残り時間：${time}秒

鰹節屋からの挑戦！
みんなもチャレンジしてみてね👇
https://kezuriba-game.github.io/dashi_memory_game/

#だし神経衰弱
#五十嵐鰹節
#だしパック極丸`;

window.open(
`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`,
"_blank"
);

}
    
    
</script>

<div id="resultModal" style="display:none;">

    <div class="modal-content">

        <h2>ゲームクリア！</h2>

        <p id="resultText"></p>

        <button onclick="shareResult()">
            Xで結果をシェア
        </button>

        <button onclick="closeModal()">
            閉じる
        </button>

    </div>

</div>
